>>>>>>> 6529f625afb39156fe842b5f2632498ae2ddf6af
    access-key: ${MINIO_ROOT_USER:lifelink_minio}
    secret-key: ${MINIO_ROOT_PASSWORD:change-me}
    bucket: ${LIFELINK_MINIO_BUCKET:lifelink}
  cors:
    allowed-origins: ${LIFELINK_CORS_ALLOWED_ORIGINS:}
  feature:
    philosophy:
      allowed-phones: ${LIFELINK_PHILOSOPHY_ALLOWED_PHONES:${LIFELINK_PSYCHOLOGY_TEACHER_ALLOWED_PHONES:}}
  reward:
    admin-phones: ${LIFELINK_REWARD_ADMIN_PHONES:}
  focus-coin:
    enabled: ${LIFELINK_FOCUS_COIN_ENABLED:true}
    unit-minutes: ${LIFELINK_FOCUS_COIN_UNIT_MINUTES:5}
    per-unit: ${LIFELINK_FOCUS_COIN_PER_UNIT:2}
    max-minutes-per-session: ${LIFELINK_FOCUS_COIN_MAX_MINUTES_PER_SESSION:120}
    daily-cap: ${LIFELINK_FOCUS_COIN_DAILY_CAP:}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:mock}
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-v4-flash}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:60}
    max-tokens: ${AI_MAX_TOKENS:1200}
    temperature: ${AI_TEMPERATURE:0.7}
    mock: ${AI_MOCK:true}
    chat-context-messages: ${AI_CHAT_CONTEXT_MESSAGES:16}
    chat-max-user-message-length: ${AI_CHAT_MAX_USER_MESSAGE_LENGTH:2000}
  cycle-care:
    daily-advice:
      enabled: ${LIFELINK_CYCLE_CARE_DAILY_ADVICE_ENABLED:true}
      cron: "${LIFELINK_CYCLE_CARE_DAILY_ADVICE_CRON:0 5 0 * * ?}"
      zone: ${LIFELINK_CYCLE_CARE_DAILY_ADVICE_ZONE:Asia/Shanghai}
      use-ai: ${LIFELINK_CYCLE_CARE_DAILY_ADVICE_USE_AI:true}
      max-regenerate-days: ${LIFELINK_CYCLE_CARE_DAILY_ADVICE_MAX_REGENERATE_DAYS:30}
