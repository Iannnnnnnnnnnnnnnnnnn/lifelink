server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: lifelink-backend
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/lifelink}
    username: ${SPRING_DATASOURCE_USERNAME:lifelink}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      database: ${SPRING_REDIS_DATABASE:0}
      password: ${SPRING_REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: ${LIFELINK_MAX_FILE_SIZE:5MB}
      max-request-size: ${LIFELINK_MAX_REQUEST_SIZE:50MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

lifelink:
  jwt:
    secret: ${LIFELINK_JWT_SECRET}
    expiration: ${LIFELINK_JWT_EXPIRATION:604800000}
  minio:
    endpoint: ${LIFELINK_MINIO_ENDPOINT:http://minio:9000}
    public-endpoint: ${LIFELINK_MINIO_PUBLIC_ENDPOINT:https://memoryspace.online}
    access-key: ${MINIO_ROOT_USER:lifelink_minio}
    secret-key: ${MINIO_ROOT_PASSWORD:change-me}
    bucket: ${LIFELINK_MINIO_BUCKET:lifelink}
  cors:
    allowed-origins: ${LIFELINK_CORS_ALLOWED_ORIGINS:}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:mock}
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-v4-flash}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:60}
    max-tokens: ${AI_MAX_TOKENS:1200}
    temperature: ${AI_TEMPERATURE:0.7}
    mock: ${AI_MOCK:true}
    chat-context-messages: ${AI_CHAT_CONTEXT_MESSAGES:16}
    chat-max-user-message-length: ${AI_CHAT_MAX_USER_MESSAGE_LENGTH:2000}
