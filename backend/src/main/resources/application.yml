server:
  port: 8081

spring:
  application:
    name: lifelink-backend
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/lifelink
    username: lifelink
    password: lifelink123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

lifelink:
  jwt:
    secret: lifelink-jwt-secret-change-me-lifelink-jwt-secret-change-me
    expiration: 604800000
  minio:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: admin123456
    bucket: lifelink
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:mock}
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-v4-flash}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:60}
    max-tokens: ${AI_MAX_TOKENS:1200}
    temperature: ${AI_TEMPERATURE:0.7}
    mock: ${AI_MOCK:true}
