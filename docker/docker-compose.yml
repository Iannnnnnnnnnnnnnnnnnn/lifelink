services:
  postgres:
    image: postgres:16
    container_name: lifelink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifelink}
      POSTGRES_USER: ${POSTGRES_USER:-lifelink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "5432:5432"
    volumes:
      - lifelink_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: lifelink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - lifelink_redis_data:/data

  minio:
    image: minio/minio
    container_name: lifelink-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lifelink_minio_data:/data

volumes:
  lifelink_postgres_data:
  lifelink_redis_data:
  lifelink_minio_data:
