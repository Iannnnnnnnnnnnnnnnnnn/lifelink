services:
  mysql:
    image: mysql:8
    container_name: lifelink-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: lifelink
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - lifelink_mysql_data:/var/lib/mysql
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    container_name: lifelink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - lifelink_redis_data:/data

  minio:
    image: minio/minio
    container_name: lifelink-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lifelink_minio_data:/data

volumes:
  lifelink_mysql_data:
  lifelink_redis_data:
  lifelink_minio_data: